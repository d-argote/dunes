                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],

        body {
            background-color: theme('colors.background');
        }

<body class="min-h-screen flex items-center justify-center overflow-hidden antialiased">
<div class="flex w-full h-screen">
<!-- Left Section: Macro Photography -->
<div class="hidden md:flex w-[60%] relative overflow-hidden bg-surface-container-highest flex-col items-center justify-center" data-alt="Macro photography of fresh rosemary sprigs and ginger root resting on a textured, dark marble surface. The scene features deep, moody shadows and sharp, focused lighting that highlights the organic textures of the botanicals against the brutalist stone. The overall aesthetic is raw, premium, and sophisticated, aligning with a dark organic brutalism theme." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCmgvIknRO2wRP7Xh-KqFeCVub8EeCIXvuvBmQJETy-YHzEonx5_J0kigHZm2-bSlLiBob0rekgJu6Jfb4apDCkZTs41ubU63xn_hT8SvnqdNN6AQRkWqvsITkBKu353i1lSGUuyTCdx-f20iSONPJoLdFAONjiBTvSI3TeeMuldGMag5ZQ9nCGRsxLVCO_-J3wi5mUev2q3fq58-1w-JdqwMsOYVLf71PdFUk6s3-IIuzqQP5RIyH_rwVYPB2ZT0nZUF8W8wmOHw'); background-size: cover; background-position: center;">
<!-- Dark Overlay -->
<div class="absolute inset-0 bg-black/60 z-0"></div>
<!-- Centered Content -->
<div class="relative z-10 text-center flex flex-col items-center gap-4 px-12">
<h1 class="font-display-lg text-[72px] text-white tracking-[0.1em] leading-none uppercase">DUNES</h1>
<p class="font-headline-md text-[12px] text-white/60 tracking-widest uppercase">PANEL DE CONTROL — SISTEMA ADMINISTRATIVO 2026</p>
</div>
</div>
<!-- Right Section: Login Panel -->
<div class="w-full md:w-[40%] bg-surface flex flex-col justify-center px-8 md:px-16 lg:px-24 h-full z-10 shadow-[-16px_0_32px_rgba(28,28,24,0.05)]">
<div class="w-full max-w-sm mx-auto flex flex-col gap-12">
<!-- Header -->
<div class="flex flex-col gap-4">
<h2 class="font-display-md text-primary tracking-tighter uppercase text-[32px]">DUNES</h2>
<div class="flex flex-col gap-2">
<span class="font-label-md text-secondary uppercase tracking-widest text-[10px]">ACCESO ADMINISTRATIVO</span>
<h3 class="font-headline-lg text-on-surface">Bienvenido de vuelta.</h3>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-8">
<!-- Email Input -->
<div class="relative">
<input class="peer w-full bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary px-0 py-2 font-body-md placeholder-transparent transition-colors" id="email" placeholder="Correo Electrónico" type="email"/>
<label class="absolute left-0 -top-4 font-headline-md text-label-md text-on-surface-variant transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-2 peer-focus:-top-4 peer-focus:text-label-md peer-focus:text-primary uppercase" for="email">Correo Electrónico</label>
</div>
<!-- Password Input -->
<div class="relative">
<input class="peer w-full bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary px-0 py-2 font-body-md placeholder-transparent transition-colors" id="password" placeholder="Contraseña" type="password"/>
<label class="absolute left-0 -top-4 font-headline-md text-label-md text-on-surface-variant transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-2 peer-focus:-top-4 peer-focus:text-label-md peer-focus:text-primary uppercase" for="password">Contraseña</label>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</div>
<span class="font-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Recordar dispositivo</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-lg tracking-[0.15em] uppercase py-4 px-8 rounded-[2px] hover:bg-primary-container transition-colors mt-4" type="submit">
                        INICIAR SESIÓN
                    </button>
</form>
<!-- Footer Links (Optional/Implicit in luxury design) -->
<div class="text-center mt-8">
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
</div>
</div>
</body></html>
